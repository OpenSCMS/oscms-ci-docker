stages:
  - docker-ci-build
  - docker-ci-push

default:
  tags:
   - docker

include:
  - local: ".gitlab-ci/docker.yml"

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0 # Force a full clone of all branches
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_DEPTH: 0
  GIT_SUBMODULE_FORCE_HTTPS: "true"
  CI_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  FF_NETWORK_PER_BUILD: "true"
