name: OpenSCMS/oscms-ci-docker
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  CI_REGISTRY: ghcr.io
  CI_REGISTRY_USER: ${{ github.actor }}
  CI_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: "${{ github.ref }}"
  cancel-in-progress: true

jobs:
  lower-case-repo-name:
    runs-on:
      - ubuntu-latest
    steps:
      - id: set-variable
        run: echo "LC_REPO_NAME=${GITHUB_REPOSITORY,,}" >>${GITHUB_OUTPUT}

    outputs:
      LC_REPO_NAME: ${{ steps.set-variable.outputs.LC_REPO_NAME }}

  build-docker-ci-image:
    needs: lower-case-repo-name

    env:
      CI_REGISTRY_IMAGE: "${{ github.repository }}"
      CI_IMAGE: "${{ github.repository }}:${{ github.sha }}"
      # CI_REGISTRY_IMAGE: "${{ needs.lower-case-repo-name.outputs.LC_REPO_NAME }}"
      # CI_IMAGE: "${{ needs.lower-case-repo-name.outputs.LC_REPO_NAME }}:${{ github.sha }}"

    runs-on:
      - ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.0
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.CI_REGISTRY }}
          username: ${{ env.CI_REGISTRY_USER }}
          password: ${{ env.CI_REGISTRY_PASSWORD }}

      - name: Get image metadata
        id: meta
        uses: docker/metadata-action@v5.0.0
        with:
          images: ${{ env.CI_REGISTRY }}/${{ env.CI_REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{ is_default_branch }}
            type=ref,event=tag
            type=ref,event=pr

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.CI_REGISTRY }}/${{ env.CI_REGISTRY_IMAGE }}:latest
          file: openscms-ci.dockerfile

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: "${{ env.CI_REGISTRY }}/${{ needs.lower-case-repo-name.outputs.LC_REPO_NAME }}"
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
