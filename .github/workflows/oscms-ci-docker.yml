name: OpenSCMS/oscms-ci-docker
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  CI_REGISTRY: ghcr.io
  CI_REGISTRY_IMAGE: ghcr.io/openscms/oscms-ci-docker
  CI_SERVER_REGISTRY_IMAGE: ghcr.io/openscms/oscms-server-ci-docker

concurrency:
  group: "${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-docker-ci-image:
    runs-on:
      - ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.0
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.CI_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get image metadata
        id: meta
        uses: docker/metadata-action@v5.0.0
        with:
          images: ${{ env.CI_REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{ is_default_branch }}
            type=ref,event=tag
            type=ref,event=pr

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.CI_REGISTRY_IMAGE }}:latest
          file: openscms-ci.dockerfile

      - name: Image digest
        run: echo ${{ steps.push.outputs.digest }}

  build-server-docker-ci-image:
    runs-on:
      - ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.0
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.CI_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get image metadata
        id: meta
        uses: docker/metadata-action@v5.0.0
        with:
          images: ${{ env.CI_SERVER_REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{ is_default_branch }}
            type=ref,event=tag
            type=ref,event=pr

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.CI_SERVER_REGISTRY_IMAGE }}:latest
          file: openscms-server-ci.dockerfile

      - name: Image digest
        run: echo ${{ steps.push.outputs.digest }}
